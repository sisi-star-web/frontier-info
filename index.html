<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>前沿信息 · AI Agent 前沿资讯站</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-text">前沿信息</span>
      </div>
      <nav class="tabs">
        <button class="tab-btn active" data-tab="daily">日报</button>
        <button class="tab-btn" data-tab="weekly">周报</button>
        <button class="tab-btn" data-tab="favorites">我的收藏</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 id="pageTitle">前沿信息日报</h1>
      <p id="pageGreeting" class="greeting"></p>
      <div class="meta-row">
        <span id="pageDate" class="pill"></span>
        <select id="dateSelect" class="date-select"></select>
      </div>
    </section>

    <section id="content" class="content"></section>

    <section id="actionItem" class="action-card" style="display:none">
      <div class="action-label">本期行动建议</div>
      <p id="actionText"></p>
    </section>
  </main>

  <footer class="footer">
    <p>前沿信息 · 每日/每周自动生成 · 为游戏客服 Agent 工程师而做</p>
  </footer>

  <div id="detailModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <button id="modalClose" class="modal-close">×</button>
      <div class="modal-tag" id="modalTag"></div>
      <h2 id="modalTitle"></h2>
      <p id="modalSummary"></p>
      <div class="modal-value" id="modalValue"></div>
      <a id="modalLink" class="btn-primary" href="#" target="_blank" rel="noopener">查看详情原文 →</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
